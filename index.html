<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MaintPro CMMS — Sistema de Gestión de Mantenimiento</title>
  <meta name="description" content="Sistema CMMS completo para gestión de mantenimiento industrial. Gestiona activos, órdenes de trabajo, mantenimiento preventivo, inventario y personal técnico.">
  <meta name="keywords" content="CMMS, mantenimiento, gestión de activos, órdenes de trabajo, mantenimiento preventivo, inventario, KPIs">
  <meta name="author" content="MaintPro">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo"><i class="fas fa-gear"></i></div>
      <div>
        <div class="sidebar-title">MaintPro</div>
        <div class="sidebar-subtitle">CMMS</div>
      </div>
    </div>

    <div class="company-selector">
      <label>Empresa Activa</label>
      <select class="company-select" id="companySelect"></select>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-title">Principal</div>
      <div class="nav-item active" data-view="dashboard">
        <i class="fas fa-chart-line"></i>
        <span>Dashboard</span>
      </div>
      <div class="nav-item" data-view="assets">
        <i class="fas fa-cogs"></i>
        <span>Activos / Equipos</span>
      </div>
      <div class="nav-item" data-view="workorders">
        <i class="fas fa-clipboard-list"></i>
        <span>Órdenes de Trabajo</span>
        <span class="nav-badge" id="badgePendingWOs" style="display:none">0</span>
      </div>

      <div class="nav-section-title">Planificación</div>
      <div class="nav-item" data-view="preventive">
        <i class="fas fa-calendar-check"></i>
        <span>Mtto. Preventivo</span>
        <span class="nav-badge" id="badgeOverduePMs" style="display:none">0</span>
      </div>
      <div class="nav-item" data-view="inventory">
        <i class="fas fa-boxes-stacked"></i>
        <span>Inventario</span>
        <span class="nav-badge" id="badgeLowStock" style="display:none">0</span>
      </div>
      <div class="nav-item" data-view="personnel">
        <i class="fas fa-users-gear"></i>
        <span>Personal Técnico</span>
      </div>

      <div class="nav-section-title">Análisis</div>
      <div class="nav-item" data-view="reports">
        <i class="fas fa-chart-pie"></i>
        <span>Reportes y KPIs</span>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div>MaintPro CMMS v1.0</div>
      <div style="margin-top:4px;font-size:0.65rem">Proyecto Académico — UNIPAZ</div>
    </div>
  </aside>

  <!-- Main Content -->
  <div id="main-content">
    <header id="topbar">
      <div class="topbar-left">
        <button class="btn btn-icon btn-menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
          <i class="fas fa-bars"></i>
        </button>
        <h1 id="topbarTitle" class="topbar-title">Dashboard</h1>
      </div>
      <div class="topbar-right">
        <span style="font-size:0.8rem;color:var(--text-muted)" id="currentDate"></span>
      </div>
    </header>

    <div id="content">
      <section id="view-dashboard" class="view-section active"></section>
      <section id="view-assets" class="view-section"></section>
      <section id="view-workorders" class="view-section"></section>
      <section id="view-preventive" class="view-section"></section>
      <section id="view-inventory" class="view-section"></section>
      <section id="view-personnel" class="view-section"></section>
      <section id="view-reports" class="view-section"></section>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Modal</h2>
        <button class="modal-close" id="modalClose"><i class="fas fa-xmark"></i></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="modalCancel">Cancelar</button>
        <button class="btn btn-primary" id="modalSave"><i class="fas fa-check"></i> Guardar</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Scripts -->
  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Display current date
    document.getElementById('currentDate').textContent = new Date().toLocaleDateString('es-CO', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
  </script>
</body>
</html>
